  <style>

    .home-notebook-container {

    .home-notebook-image {
      max-width: 400px;
      height: auto;
      cursor: pointer;
      transition: transform 0.2s ease;
      user-select: none;
    }

    .home-notebook-image:hover {
      transform: scale(1.05);
    }

    .home-notebook-image:active {
      transform: scale(0.98);
    }

    .emoji-burst {
      position: fixed;
      pointer-events: none;
      font-size: 2rem;
      animation: burst 1s ease-out forwards;
      z-index: 1000;
    }

    @keyframes burst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0.5);
      }
    }

    @keyframes burst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0.5);
      }
    }
  </style>

  <script>
    const emojiZones = {
      'topLeft': ['🌈', '🧚', '🌈', '😊', '🌈', '🧚', '🌈'],
      'topRight': ['🥕', '🐝', '🥕', '💛', '🥕', '🐝', '🥕'],
      'middleLeft': ['🌹', '💗', '💖', '🦋', '🌹', '💖', '💗'],
      'middleRight': ['🫧', '💧', '🌊', '🌸', '🫧', '💧', '🌊'],
      'bottomLeft': ['🍄', '🐞', '🍄', '🐞', '🍄', '🐞'],
      'bottomRight': ['🦋', '🌽', '🐥', '🦆', '🪿', '🐤']
    };

    function determineZone(x, y, rect) {
      // Normalize coordinates relative to image
      const relX = x - rect.left;
      const relY = y - rect.top;
      
      const midX = rect.width / 2;
      const midY = rect.height / 3;
      
      // Determine row and column
      const row = relY < midY ? 'top' : relY < midY * 2 ? 'middle' : 'bottom';
      const col = relX < midX ? 'Left' : 'Right';
      
      return row + col;
    }
    
    document.getElementById('notebook-easter-egg').addEventListener('click', function(e) {
      // Use clientX/clientY for fixed positioning (viewport coordinates)
      const clickX = e.clientX;
      const clickY = e.clientY;

      const rect = this.getBoundingClientRect();
      const zone = determineZone(clickX, clickY, rect);
      const emojis = emojiZones[zone] || ['🌱', '🌿', '🌾', '🌻', '🌹', '🥬', '🍅', '🌸', '🎉', '✨', '💚', '🐝'];

      // Create burst of emojis from clicked location
      for (let i = 0; i < emojis.length; i++) {
        const angle = (i / emojis.length) * Math.PI * 2;
        const distance = 180;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;

        const emoji = emojis[i];
        const emojiEl = document.createElement('div');
        emojiEl.className = 'emoji-burst';
        emojiEl.textContent = emoji;
        emojiEl.style.left = clickX + 'px';
        emojiEl.style.top = clickY + 'px';
        emojiEl.style.setProperty('--tx', tx + 'px');
        emojiEl.style.setProperty('--ty', ty + 'px');

        document.body.appendChild(emojiEl);
        setTimeout(() => emojiEl.remove(), 1000);
      }
    });
  </script>
